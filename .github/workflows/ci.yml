name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest httpx

      - name: Run tests
        run: |
          .venv/bin/pytest -q pytests/test_job_tracker.py pytests/test_strategy_api_contract.py pytests/test_quota.py pytests/test_final_strategy_engine.py

      - name: Health check endpoint
        run: |
          .venv/bin/python - <<'PY'
import requests, time

# run temporary uvicorn process
import subprocess, os, signal
p = subprocess.Popen(['.venv/bin/uvicorn', 'main:app', '--host', '0.0.0.0', '--port', '8000'], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
try:
    time.sleep(3)
    r = requests.get('http://127.0.0.1:8000/healthz', timeout=10)
    assert r.status_code == 200
    r2 = requests.get('http://127.0.0.1:8000/ready', timeout=10)
    assert r2.status_code == 200
    print('health checks passed')
finally:
    p.terminate()
    p.wait(timeout=10)
PY
