[pytest]
markers =
    production_test: run tests against external network/test server at ANNASEO_BASE
    integration: tests requiring network access (crawling real sites, AI APIs)
    functional: Group 1 — system runs correctly
    data_integrity: Group 2 — data correct across pipeline stages
    ai_reasoning: Group 3 — AI output quality and logic
    regression: Group 4 — stability over time (golden baselines)
    human_validation: Group 5 — output is actionable
    performance: Advanced — speed and memory constraints
    chaos: Advanced — failure simulation and resilience
    llm_judge: Requires live Ollama connection
