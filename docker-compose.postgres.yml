version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: annaseo
      POSTGRES_PASSWORD: annaseo_password
      POSTGRES_DB: annaseo
    volumes:
      - annaseo-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annaseo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  annaseo-pgdata:
  redis-data:
